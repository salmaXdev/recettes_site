    <title>Tajine Poulet</title>

<body>

    <h1>🍗 Tajine Poulet</h1>
    <img src="recette1.png" width="300">

    <h2>Ingrédients :</h2>
    <ul>
        <li>Poulet</li>
        <li>Oignon</li>
        <li>Ail</li>
        <li>Épices (curcuma, gingembre)</li>
        <li>Olives</li>
    </ul>

    <h2>Préparation :</h2>
    <p>
        Faire cuire le poulet avec les épices et l'oignon.
        Ajouter les olives et laisser mijoter 40 minutes.
        Servir chaud.
    </p>
