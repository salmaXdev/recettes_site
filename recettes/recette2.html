<body>

    <h1>🥗 Salade Marocaine</h1>
    <img src="recette2.png" width="300">

    <h2>Ingrédients :</h2>
    <ul>
        <li>Tomates</li>
        <li>Concombre</li>
        <li>Oignon</li>
        <li>Huile d'olive</li>
        <li>Sel et citron</li>
    </ul>

    <h2>Préparation :</h2>
    <p>
        Couper tous les légumes en petits morceaux.
        Ajouter l'huile d'olive, le sel et le citron.
        Mélanger et servir frais.
    </p>
